# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you: 
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Sarace 的博客
email: tuty277@126.com
description: >- # this means to ignore newlines until "baseurl:"
  A CTFer and Coder
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com
twitter:
  username: "Sarace_D"
github_username:  ttxs69

# Build settings
theme: minimal-mistakes-jekyll
remote_theme: "mmistakes/minimal-mistakes@4.19.2"
plugins:
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-archives
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jemoji


#Skin
minimal_mistakes_skin: "dark" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum" "sunrise"
#Locale
locale: "zh-CN"
name: "Sarace"
url: "https://blog.huisa.win"

# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true


#Comments
comments:
  provider: "disqus"
  disqus:
    shortname: "ttxs69"

#Search
search: true

#Analytics
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "UA-128583065-1"
    anonymize_ip: false # default

#Author
author:
  name: "Sarace"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "CTFer and Coder" # Note: Markdown is allowed
  location: "China"
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/Sarace_D"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ttxs69"

#Footer
footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/Sarace_D"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ttxs69"


#Achive
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/


compress_html:
  clippings: all
  ignore:
    envs: development  # disable compression in dev environment
# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
